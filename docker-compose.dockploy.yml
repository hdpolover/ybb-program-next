services:
  ybb-program-next:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_S3_URL: ${NEXT_PUBLIC_S3_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: ybb-program-next
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_S3_URL=${NEXT_PUBLIC_S3_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Add all your domains here using the OR logic (||)
      - "traefik.http.routers.ybb-program-next.rule=${APP_DOMAINS_RULE}"
      - "traefik.http.routers.ybb-program-next.entrypoints=websecure"
      - "traefik.http.routers.ybb-program-next.tls.certresolver=letsencrypt"
      - "traefik.http.services.ybb-program-next.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"

networks:
  dokploy-network:
    external: true
