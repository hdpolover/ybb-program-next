
services:
  ybb-program-next:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_S3_URL: ${NEXT_PUBLIC_S3_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: ybb-program-next
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_S3_URL=${NEXT_PUBLIC_S3_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    networks:
      - dokploy-network
    # Dokploy handles Traefik labels and SSL termination automatically via the UI

networks:
  dokploy-network:
    external: true
