version: '3.8'

services:
  ybb-program-next:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ybb-program-next-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    ports:
      - "3010:3000"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - ybb-network

networks:
  ybb-network:
    external: true
    name: ybb-platform_ybb-network
